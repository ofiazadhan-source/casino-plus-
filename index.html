
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casino Plus</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0d0d0d;
    color: white;
    text-align: center;
  }
  h1 {
    margin-top: 20px;
    color: #ffd700;
  }
  .game-container {
    margin: 20px auto;
    max-width: 600px;
  }
  button {
    background: #ffd700;
    border: none;
    padding: 12px 24px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    margin: 10px;
  }
  button:hover {
    background: #ffcc00;
  }
</style>
</head>
<body>
  <h1>🎰 Welcome to Casino Plus 🎰</h1>
  <div class="game-container">
    <p>Login to start playing!</p>
    <button id="loginBtn">Login with Google</button>
    <div id="userInfo"></div>
  </div>

<script type="module">
  // Import Firebase SDK
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

  // Your web app's Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyBnAiat7Y8YvBp4WVsSGmRdDMKCJYzkCiw",
    authDomain: "casino-plus-game.firebaseapp.com",
    projectId: "casino-plus-game",
    storageBucket: "casino-plus-game.firebasestorage.app",
    messagingSenderId: "293210899446",
    appId: "1:293210899446:web:a0e56e65c46972c6a0fdd7"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  const loginBtn = document.getElementById("loginBtn");
  const userInfo = document.getElementById("userInfo");

  // Login button
  loginBtn.addEventListener("click", async () => {
    try {
      await signInWithPopup(auth, provider);
    } catch (error) {
      console.error("Login error:", error);
      alert("Login failed: " + error.message);
    }
  });

  // Check login state
  onAuthStateChanged(auth, (user) => {
    if (user) {
      userInfo.innerHTML = `
        <p>Hello, ${user.displayName}!</p>
        <img src="${user.photoURL}" width="50" style="border-radius:50%;">
        <br>
        <button id="logoutBtn">Logout</button>
      `;
      loginBtn.style.display = "none";
      
      document.getElementById("logoutBtn").onclick = () => signOut(auth);
    } else {
      userInfo.innerHTML = "";
      loginBtn.style.display = "inline-block";
    }
  });
</script>
</body>
</html>
